---
- name: Update apt cache
  apt:
    update_cache: yes
    cache_valid_time: 3600

- name: Install gnupg for PPA support
  apt:
    name:
      - gnupg
      - software-properties-common
    state: present

- name: Add Redis PPA for specific versions
  apt_repository:
    repo: ppa:redislabs/redis
    state: present
    update_cache: yes

- name: Install Redis server and tools
  apt:
    name:
      - redis-server
      - redis-tools
      - python3
      - python3-pip
    state: present

- name: Create Redis user
  user:
    name: redis
    system: yes
    shell: /bin/false
    home: /var/lib/redis
    create_home: yes

- name: Create Redis directories
  file:
    path: "{{ item }}"
    state: directory
    owner: redis
    group: redis
    mode: '0755'
  loop:
    - /var/lib/redis
    - /var/log/redis
    - /etc/redis

- name: Configure Redis
  template:
    src: redis.conf.j2
    dest: /etc/redis/redis.conf
    owner: redis
    group: redis
    mode: '0644'
  notify: restart redis

- name: Create Redis systemd service
  template:
    src: redis.service.j2
    dest: /etc/systemd/system/redis.service
    mode: '0644'
  notify: reload systemd

- name: Enable and start Redis
  systemd:
    name: redis
    enabled: yes
    state: started
    daemon_reload: yes

- name: Wait for Redis to be ready
  wait_for:
    port: 6379
    delay: 2
    timeout: 30
