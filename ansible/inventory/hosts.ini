redis-node-2 ansible_host=10.10.0.12 ansible_user=root ansible_ssh_private_key_file=../../infra/ssh-keys/id_rsa
redis-node-3 ansible_host=10.10.0.13 ansible_user=root ansible_ssh_private_key_file=../../infra/ssh-keys/id_rsa

[redis_replicas]
redis-node-4 ansible_host=10.10.0.14 ansible_user=root ansible_ssh_private_key_file=../../infra/ssh-keys/id_rsa
redis-node-5 ansible_host=10.10.0.15 ansible_user=root ansible_ssh_private_key_file=../../infra/ssh-keys/id_rsa
redis-node-6 ansible_host=10.10.0.16 ansible_user=root ansible_ssh_private_key_file=../../infra/ssh-keys/id_rsa

[redis_cluster:children]
