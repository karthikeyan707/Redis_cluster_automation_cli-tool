---
- name: Provision Redis Cluster
  hosts: redis_cluster
  become: yes
  vars:
    redis_version: "{{ redis_version | default('7.0.15') }}"

  roles:
    - redis

- name: Wait for Redis to be ready
  hosts: redis_cluster
  become: yes
  tasks:
    - name: Wait for Redis to start
      wait_for:
        port: 6379
        delay: 5
        timeout: 60

- name: Initialize Redis Cluster
  hosts: redis_masters[0]
  become: yes
  tasks:
    - name: Create Redis Cluster with automatic replica assignment
      command: >
        redis-cli --cluster create
        10.10.0.11:6379
        10.10.0.12:6379
        10.10.0.13:6379
        10.10.0.14:6379
        10.10.0.15:6379
        10.10.0.16:6379
        --cluster-replicas 1
        --cluster-yes
      register: cluster_create

    - name: Display cluster creation result
      debug:
        msg: "{{ cluster_create.stdout }}"

    - name: Wait for cluster to stabilize
      pause:
        seconds: 10

- name: Verify cluster state
  hosts: redis_masters[0]
  become: yes
  tasks:
    - name: Check cluster state
      command: redis-cli CLUSTER INFO
      register: cluster_info

    - name: Display cluster info
      debug:
        msg: "{{ cluster_info.stdout_lines }}"

- name: Seed test data
  hosts: redis_masters[0]
  become: yes
  tasks:
    - name: Seed 1000 test keys
      shell: >
        for i in $(seq 1 1000); do
          redis-cli SET "key:$i" "value:$i"
        done
      register: seed_result

    - name: Display seed result
      debug:
        msg: "Data seeding completed"
