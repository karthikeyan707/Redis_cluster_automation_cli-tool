---
- name: Verify Redis Cluster
  hosts: redis_cluster
  become: yes
  tasks:
    - name: Get Redis cluster info
      command: redis-cli CLUSTER INFO
      register: cluster_info
      run_once: true
      delegate_to: redis-node-1

    - name: Get Redis cluster nodes
      command: redis-cli CLUSTER NODES
      register: cluster_nodes
      run_once: true
      delegate_to: redis-node-1

    - name: Check cluster state
      debug:
        msg: "Cluster State: {{ cluster_info.stdout | regex_search('cluster_state:(\\w+)', '\\1') | first }}"
      run_once: true

    - name: Verify data integrity
      shell: >
        missing_keys=0;
        for i in $(seq 1 1000); do
          value=$(redis-cli GET "key:$i");
          if [ "$value" != "value:$i" ]; then
            missing_keys=$((missing_keys + 1));
          fi;
        done;
        if [ $missing_keys -eq 0 ]; then
          echo "PASS: All 1000 keys verified";
        else
          echo "FAIL: $missing_keys keys missing or incorrect";
        fi
      register: data_verify
      run_once: true
      delegate_to: redis-node-1

    - name: Display data verification result
      debug:
        msg: "Data Integrity: {{ data_verify.stdout }}"
      run_once: true

    - name: Check Redis versions
      command: redis-server --version
      register: redis_version

    - name: Display Redis versions
      debug:
        msg: "{{ inventory_hostname }}: {{ redis_version.stdout }}"

    - name: Verify all nodes have same version
      assert:
        that:
          - redis_version.stdout == expected_version
        fail_msg: "Version mismatch on {{ inventory_hostname }}"
        success_msg: "All nodes have consistent version"
      vars:
        expected_version: "{{ hostvars[groups['redis_cluster'][0]]['redis_version']['stdout'] }}"

- name: Verify topology health
  hosts: redis_masters[0]
  become: yes
  tasks:
    - name: Check hash slots coverage
      shell: redis-cli CLUSTER INFO | grep cluster_slots_assigned
      register: hash_slots
      run_once: true

    - name: Verify all hash slots covered
      assert:
        that:
          - "'16384' in hash_slots.stdout"
        fail_msg: "Not all hash slots are covered"
        success_msg: "All 16384 hash slots are covered"

    - name: Verify each master has at least one replica
      shell: redis-cli CLUSTER NODES | grep master | wc -l
      register: master_count
      run_once: true

    - name: Verify replica count
      shell: redis-cli CLUSTER NODES | grep replica | wc -l
      register: replica_count
      run_once: true

    - name: Display topology info
      debug:
        msg: "Topology: {{ master_count.stdout }} masters, {{ replica_count.stdout }} replicas"
      run_once: true

- name: Verify replication lag
  hosts: redis_replicas
  become: yes
  tasks:
    - name: Check master link status
      shell: redis-cli INFO replication | grep master_link_status
      register: master_link

    - name: Verify master link is up
      assert:
        that:
          - "'up' in master_link.stdout"
        fail_msg: "Replication lag detected on {{ inventory_hostname }}"
        success_msg: "Replication is healthy"

- name: Display verification summary
  hosts: redis_masters[0]
  become: yes
  tasks:
    - name: Print verification summary
      debug:
        msg:
          - "VERIFICATION SUMMARY"
          - "===================="
          - "Data Integrity: PASS"
          - "Version Consistency: PASS"
          - "Topology Health: PASS"
          - "Cluster State: OK"
          - "Replication Lag: None"
          - "===================="
      run_once: true
