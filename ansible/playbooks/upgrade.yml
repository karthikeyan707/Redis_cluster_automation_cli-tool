---
- name: Upgrade Redis Cluster
  hosts: redis_cluster
  become: yes
  serial: 1
  vars:
    target_version: "{{ target_version | default('7.2.6') }}"

  tasks:
    - name: Stop Redis service
      systemd:
        name: redis
        state: stopped

    - name: Download new Redis source
      get_url:
        url: "http://download.redis.io/releases/redis-{{ target_version }}.tar.gz"
        dest: /tmp/redis-{{ target_version }}.tar.gz
        mode: '0644'

    - name: Extract new Redis source
      unarchive:
        src: /tmp/redis-{{ target_version }}.tar.gz
        dest: /tmp
        remote_src: yes

    - name: Build new Redis
      command: make
      args:
        chdir: /tmp/redis-{{ target_version }}

    - name: Install new Redis
      command: make install
      args:
        chdir: /tmp/redis-{{ target_version }}

    - name: Start Redis service
      systemd:
        name: redis
        state: started
        enabled: yes

    - name: Wait for Redis to be ready
      wait_for:
        port: 6379
        delay: 2
        timeout: 30

    - name: Verify Redis version
      command: redis-cli --version
      register: redis_version_check

    - name: Display upgrade progress
      debug:
        msg: "[{{ ansible_play_hosts | index(inventory_hostname) + 1 }}/{{ ansible_play_hosts | length }}] Upgraded {{ inventory_hostname }} to Redis {{ target_version }}"
