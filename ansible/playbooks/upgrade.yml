---
- name: Upgrade Redis Cluster
  hosts: redis_cluster
  become: yes
  serial: 1
  vars:
    target_version: "{{ target_version | default('7.2.6') }}"

  tasks:
    - name: Stop Redis
      command: pkill redis-server
      ignore_errors: yes

    - name: Wait for Redis to stop
      wait_for:
        port: 6379
        state: stopped
        timeout: 30

    - name: Upgrade Redis package
      apt:
        name: redis-server
        state: latest
        update_cache: yes

    - name: Start Redis
      command: redis-server /etc/redis/redis.conf --daemonize yes

    - name: Wait for Redis to be ready
      wait_for:
        port: 6379
        delay: 2
        timeout: 30

    - name: Verify Redis version
      command: redis-server --version
      register: redis_version_check

    - name: Display upgrade progress
      debug:
        msg: "Upgraded {{ inventory_hostname }}"
