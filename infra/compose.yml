version: '3.8'

services:
  redis-node-1:
    image: ubuntu:22.04
    container_name: redis-node-1
    hostname: redis-node-1
    networks:
      redis-cluster:
        ipv4_address: 10.10.0.11
    privileged: true
    volumes:
      - ./ssh-keys:/root/.ssh:ro
    command: /bin/bash -c "apt-get update && apt-get install -y openssh-server && mkdir -p /var/run/sshd && echo 'root:password' | chpasswd && sed -i 's/#PermitRootLogin prohibit-password/PermitRootLogin yes/' /etc/ssh/sshd_config && sed -i 's/#PasswordAuthentication yes/PasswordAuthentication yes/' /etc/ssh/sshd_config && /usr/sbin/sshd -D"

